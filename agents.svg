<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:0.4;r:5}50%{opacity:1;r:7}}
@keyframes dash{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
@keyframes glow{0%,100%{opacity:0.3}50%{opacity:1}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.spin{animation:spin 8s linear infinite;transform-origin:50% 50%}
.p1{animation:pulse 2.0s 0.0s infinite}
.p2{animation:pulse 2.0s 0.4s infinite}
.p3{animation:pulse 2.0s 0.8s infinite}
.p4{animation:pulse 2.0s 1.2s infinite}
.p5{animation:pulse 2.0s 1.6s infinite}
.dl{animation:dash 2s 0.5s ease-out both;stroke-dasharray:200;stroke-dashoffset:200}
.dl2{animation:dash 2s 1.0s ease-out both;stroke-dasharray:200;stroke-dashoffset:200}
.dl3{animation:dash 2s 1.5s ease-out both;stroke-dasharray:200;stroke-dashoffset:200}
.dl4{animation:dash 2s 2.0s ease-out both;stroke-dasharray:200;stroke-dashoffset:200}
.gl{animation:glow 2s infinite}
.float{animation:floatUp 3s ease-in-out infinite}
text{font-family:'Segoe UI',Arial,sans-serif}
</style>
</defs>

<rect width="800" height="200" rx="12" fill="#0d1117"/>
<rect x="0" y="0" width="800" height="2" rx="1" fill="url(#ag)"/>
<defs>
<linearGradient id="ag" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#8B5CF6"/><stop offset="50%" stop-color="#00d4ff"/>
<stop offset="100%" stop-color="#10B981"/>
</linearGradient>
</defs>

<text x="32" y="28" font-size="13" fill="#00d4ff" font-weight="700" letter-spacing="2">AI AGENT ARCHITECTURE</text>
<text x="32" y="44" font-size="10" fill="#484f58">orchestration · tools · memory · Google ADK</text>

<!-- ORCHESTRATOR (center) -->
<g class="float">
<rect x="310" y="70" width="140" height="52" rx="8" fill="#161b22" stroke="#00d4ff" stroke-width="1.2"/>
<rect x="310" y="70" width="140" height="2" rx="1" fill="#00d4ff"/>
<text x="380" y="92" font-size="11" fill="#00d4ff" font-weight="700" text-anchor="middle">Orchestrator</text>
<text x="380" y="106" font-size="9" fill="#8b949e" text-anchor="middle">LLM · Planning · Memory</text>
<text x="380" y="118" font-size="9" fill="#484f58" text-anchor="middle">Google ADK · n8n</text>
</g>

<!-- spinning ring around orchestrator -->
<circle cx="380" cy="96" r="42" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.3" class="spin"/>

<!-- LEFT AGENTS -->
<!-- Agent 1: Web Search -->
<rect x="60" y="58" width="120" height="44" rx="6" fill="#161b22" stroke="#8B5CF6" stroke-width="0.8"/>
<rect x="60" y="58" width="120" height="2" rx="1" fill="#8B5CF6"/>
<text x="120" y="75" font-size="10" fill="#c9d1d9" font-weight="600" text-anchor="middle">Web Search</text>
<text x="120" y="88" font-size="8" fill="#484f58" text-anchor="middle">Browsing · Retrieval</text>
<text x="120" y="98" font-size="8" fill="#8B5CF6" text-anchor="middle">● Tool Agent</text>

<!-- Agent 2: Data Analysis -->
<rect x="60" y="118" width="120" height="44" rx="6" fill="#161b22" stroke="#8B5CF6" stroke-width="0.8"/>
<rect x="60" y="118" width="120" height="2" rx="1" fill="#8B5CF6"/>
<text x="120" y="135" font-size="10" fill="#c9d1d9" font-weight="600" text-anchor="middle">Data Analysis</text>
<text x="120" y="148" font-size="8" fill="#484f58" text-anchor="middle">Python · Pandas · SQL</text>
<text x="120" y="158" font-size="8" fill="#8B5CF6" text-anchor="middle">● Tool Agent</text>

<!-- RIGHT AGENTS -->
<!-- Agent 3: Memory -->
<rect x="560" y="58" width="120" height="44" rx="6" fill="#161b22" stroke="#10B981" stroke-width="0.8"/>
<rect x="560" y="58" width="120" height="2" rx="1" fill="#10B981"/>
<text x="620" y="75" font-size="10" fill="#c9d1d9" font-weight="600" text-anchor="middle">Memory Store</text>
<text x="620" y="88" font-size="8" fill="#484f58" text-anchor="middle">RAG · Vector DB</text>
<text x="620" y="98" font-size="8" fill="#10B981" text-anchor="middle">● Context Agent</text>

<!-- Agent 4: Automation -->
<rect x="560" y="118" width="120" height="44" rx="6" fill="#161b22" stroke="#10B981" stroke-width="0.8"/>
<rect x="560" y="118" width="120" height="2" rx="1" fill="#10B981"/>
<text x="620" y="135" font-size="10" fill="#c9d1d9" font-weight="600" text-anchor="middle">Automation</text>
<text x="620" y="148" font-size="8" fill="#484f58" text-anchor="middle">n8n · Workflows</text>
<text x="620" y="158" font-size="8" fill="#10B981" text-anchor="middle">● Action Agent</text>

<!-- connector lines left -->
<line x1="180" y1="80" x2="310" y2="92" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4 3" class="dl" opacity="0.6"/>
<line x1="180" y1="140" x2="310" y2="104" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4 3" class="dl2" opacity="0.6"/>

<!-- connector lines right -->
<line x1="450" y1="92" x2="560" y2="80" stroke="#10B981" stroke-width="1" stroke-dasharray="4 3" class="dl3" opacity="0.6"/>
<line x1="450" y1="104" x2="560" y2="140" stroke="#10B981" stroke-width="1" stroke-dasharray="4 3" class="dl4" opacity="0.6"/>

<!-- pulse dots on lines -->
<circle cx="245" cy="86" r="5" fill="#8B5CF6" class="p1"/>
<circle cx="245" cy="122" r="5" fill="#8B5CF6" class="p2"/>
<circle cx="505" cy="88" r="5" fill="#10B981" class="p3"/>
<circle cx="505" cy="122" r="5" fill="#10B981" class="p4"/>

<!-- USER node far left -->
<rect x="10" y="82" width="38" height="30" rx="5" fill="#161b22" stroke="#484f58" stroke-width="0.8"/>
<text x="29" y="100" font-size="8" fill="#8b949e" text-anchor="middle">User</text>

<!-- OUTPUT node far right -->
<rect x="752" y="82" width="38" height="30" rx="5" fill="#161b22" stroke="#484f58" stroke-width="0.8"/>
<text x="771" y="100" font-size="8" fill="#8b949e" text-anchor="middle">Output</text>

<line x1="48" y1="97" x2="60" y2="80" stroke="#484f58" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.5"/>
<line x1="680" y1="80" x2="752" y2="97" stroke="#484f58" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.5"/>

<!-- bottom label -->
<text x="400" y="185" font-size="9" fill="#484f58" text-anchor="middle">Agentic AI · Multi-Agent Orchestration · Tool Use · Retrieval Augmented Generation</text>
</svg>
