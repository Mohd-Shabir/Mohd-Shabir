<svg width="800" height="380" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@keyframes w1{from{width:0}to{width:246px}}
@keyframes w2{from{width:0}to{width:225px}}
@keyframes w3{from{width:0}to{width:240px}}
@keyframes w4{from{width:0}to{width:204px}}
@keyframes w5{from{width:0}to{width:234px}}
@keyframes w6{from{width:0}to{width:165px}}
@keyframes w7{from{width:0}to{width:180px}}
.b1{animation:w1 1.4s 0.0s ease-out both}
.b2{animation:w2 1.4s 0.1s ease-out both}
.b3{animation:w3 1.4s 0.2s ease-out both}
.b4{animation:w4 1.4s 0.3s ease-out both}
.b5{animation:w5 1.4s 0.4s ease-out both}
.b6{animation:w6 1.4s 0.5s ease-out both}
.b7{animation:w7 1.4s 0.6s ease-out both}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.f1{animation:fi 0.5s 0.0s both}.f2{animation:fi 0.5s 0.1s both}
.f3{animation:fi 0.5s 0.2s both}.f4{animation:fi 0.5s 0.3s both}
.f5{animation:fi 0.5s 0.4s both}.f6{animation:fi 0.5s 0.5s both}
.f7{animation:fi 0.5s 0.6s both}
text{font-family:'Segoe UI',Arial,sans-serif}
</style>
</defs>
<rect width="800" height="380" rx="12" fill="#0d1117"/>
<rect x="0" y="0" width="800" height="2" rx="1" fill="url(#tg)"/>
<defs>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#3776AB"/><stop offset="35%" stop-color="#00d4ff"/>
<stop offset="70%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#10B981"/>
</linearGradient>
</defs>

<!-- header -->
